<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy - WonderLands</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Metamorphous', cursive;
            font-size: 4rem;
            color: #e9d5ff;
            text-shadow: 0 0 15px #9333ea, 0 0 30px #581c87;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .notice {
            font-size: 1.5rem;
            color: #a855f7;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite alternate ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.6; text-shadow: 0 0 5px rgba(168, 85, 247, 0.5); }
            100% { opacity: 1; text-shadow: 0 0 15px rgba(168, 85, 247, 1); }
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 2px solid #a855f7;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }
        .btn-back:hover {
            background: #a855f7;
            box-shadow: 0 0 20px #9333ea;
        }
    </style>
</head>
<body>

    <h1>Fantasy</h1>
    <p class="notice">na tom se pracuje Stewie</p>
    <a href="index.html" class="btn-back">⬅ Zpět na výběr</a>

</body>
</html>
