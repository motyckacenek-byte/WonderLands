<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderLands - Rozcestník</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-container">
        <div class="bg-layer bg-steampunk"></div>
        <div class="bg-layer bg-fantasy"></div>
        <div class="bg-layer bg-cyberpunk"></div>
    </div>

    <main class="wonderlands-container">
        <header class="main-header">
            <h1>WONDER<span>LANDS</span></h1>
            <p>Vyber si svůj svět a vstup do neznáma</p>
        </header>

        <div class="portals-grid">
            <a href="fantasy-akce.html" class="portal-card fantasy-portal">
                <div class="portal-content">
                    <h2>RataLARP</h2>
                    <p>Hluboké hvozdy, magie, ocel a krev. Středověké dobrodružství čeká.</p>
                </div>
            </a>

            <a href="steampunk-akce.html" class="portal-card steampunk-portal">
                <div class="portal-content">
                    <h2>Aetherium</h2>
                    <p>Vzducholodě, mosaz a pára. Svět vynálezců a mechanických zázraků.</p>
                </div>
            </a>

            <a href="cyberpunk-akce.html" class="portal-card cyberpunk-portal">
                <div class="portal-content">
                    <h2>Neon City</h2>
                    <p>Korporace, syntetika a neony. High tech, low life v betonové džungli.</p>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
