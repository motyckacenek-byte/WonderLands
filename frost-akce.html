<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frostpunk - WonderLands</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 4.5rem;
            color: #e0f7fa;
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px rgba(224, 247, 250, 0.8);
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .notice {
            font-size: 1.5rem;
            color: #e0f7fa;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 2px solid #e0f7fa;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }
        .btn-back:hover {
            background: #e0f7fa;
            color: black;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>
<body>

    <h1>Frostpunk</h1>
    <p class="notice">na tom se pracuje Stewie</p>
    <a href="index.html" class="btn-back">⬅ Zpět na výběr</a>

</body>
</html>
