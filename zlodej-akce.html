<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loupežnický les - WonderLands</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 3.5rem;
            color: #e6c280;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 15px #4a2e1b;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .notice {
            font-size: 1.4rem;
            color: #6b4226;
            background: rgba(20, 10, 4, 0.6);
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid #4a2e1b;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 2px solid #6b4226;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }
        .btn-back:hover {
            background: #6b4226;
            box-shadow: 0 0 20px #4a2e1b;
        }
    </style>
</head>
<body>

    <h1>Loupežnický Les</h1>
    <p class="notice">na tom se pracuje Stewie</p>
    <a href="index.html" class="btn-back">⬅ Zpět na výběr</a>

</body>
</html>
